name: LightMark Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== 第一层：单元测试 ====================
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests (116 cases)
        run: npm run test:unit
      
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            tests/*.test.js
          retention-days: 7

  # ==================== 第二层：组件测试 ====================
  component-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Vitest dependencies
        run: npm install -D vitest @testing-library/svelte jsdom @vitest/coverage-v8
      
      - name: Run component tests
        run: npm run test:component
      
      - name: Upload component test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: component-test-results
          path: |
            tests/components/*.test.js
          retention-days: 7

  # ==================== 第三层：E2E 测试 ====================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-test]  # 确保先构建
    timeout-minutes: 30  # 添加超时保护
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        run: npm run build:frontend
      
      - name: Run E2E tests (Chromium only)
        run: npx playwright test --project=chromium --reporter="list" --reporter="json=playwright-report/report.json" --reporter="html=playwright-report"
        id: e2e-run
        continue-on-error: true
      
      - name: Show test report path
        run: |
          echo "=== Test Report Location ==="
          ls -la playwright-report/ || echo "playwright-report directory not found"
          ls -la *.json || echo "No JSON files in root"
      
      - name: Upload JSON test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-json
          path: playwright-report/report.json
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-html
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Analyze test results
        if: always() && steps.e2e-run.outcome != 'success'
        run: |
          echo "::group::E2E Test Failure Analysis"
          echo "❌ E2E tests failed!"
          echo ""
          if [ -f playwright-report/report.json ]; then
            echo "Parsing test report..."
            # 使用 jq 解析 JSON (GitHub Actions 预装)
            if command -v jq &> /dev/null; then
              TOTAL=$(jq '.stats.total' playwright-report/report.json)
              PASSED=$(jq '.stats.expected' playwright-report/report.json)
              FAILED=$(jq '.stats.unexpected + .stats.flaky' playwright-report/report.json)
              echo "Total tests: $TOTAL"
              echo "Passed: $PASSED"
              echo "Failed/Flaky: $FAILED"
              echo ""
              echo "=== Failed Tests ==="
              jq -r '.tests[] | select(.outcome == "unexpected" or .outcome == "flaky") | "❌ " + .title' playwright-report/report.json
            else
              echo "JSON report available at: playwright-report/report.json"
              echo "Download the artifact to view details."
            fi
          else
            echo "⚠️ report.json not found, checking test-results directory..."
            ls -la test-results/ | head -20
          fi
          echo "::endgroup::"
          echo ""
          echo "📎 Artifacts uploaded:"
          echo "  - playwright-report-json"
          echo "  - playwright-report-html"
          echo "  - e2e-test-results"
          echo ""
          echo "Note: This step always exits with error to fail the workflow when tests fail."
          exit 1

  # ==================== 构建测试 ====================
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run build test
        run: npm run test:build
      
      - name: Build frontend
        run: npm run build:frontend
        continue-on-error: true

  # ==================== 代码质量检查 ====================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run lint (if configured)
        run: npm run lint || echo "Lint not configured"

  # ==================== 测试覆盖率 ====================
  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install coverage dependencies
        run: npm install -D @vitest/coverage-v8
      
      - name: Generate coverage report
        run: npm run test:coverage || npm run test:unit -- --experimental-test-coverage
        continue-on-error: true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
          retention-days: 30

  # ==================== 汇总报告 ====================
  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, e2e-tests, build-test]
    if: always()
    
    steps:
      - name: Generate test summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component Tests | ${{ needs.component-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Total Test Files: 17" >> $GITHUB_STEP_SUMMARY
          echo "- Total Test Cases: 236+" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: 116 cases" >> $GITHUB_STEP_SUMMARY
          echo "- Component Tests: 80+ cases" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: 40+ cases" >> $GITHUB_STEP_SUMMARY
