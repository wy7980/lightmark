name: LightMark Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== 第一层：单元测试 ====================
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests (116 cases)
        run: npm run test:unit
      
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            tests/*.test.js
          retention-days: 7

  # ==================== 第二层：组件测试 ====================
  component-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Vitest dependencies
        run: npm install -D vitest @testing-library/svelte jsdom @vitest/coverage-v8
      
      - name: Run component tests
        run: npm run test:component
      
      - name: Upload component test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: component-test-results
          path: |
            tests/components/*.test.js
          retention-days: 7

  # ==================== 第三层：E2E 测试 ====================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-test]  # 确保先构建
    timeout-minutes: 30  # 添加超时保护
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        run: npm run build:frontend
      
      - name: Start preview server
        run: npx vite preview --port 5173 --host &
      
      - name: Wait for server
        run: |
          echo "Waiting for preview server to start..."
          for i in {1..60}; do
            if curl -s http://localhost:5173 > /dev/null; then
              echo "✅ Server is ready after ${i} seconds!"
              exit 0
            fi
            echo "Waiting... (${i}/60)"
            sleep 1
          done
          echo "❌ Server failed to start after 60 seconds"
          exit 1
      
      - name: Run E2E tests (Chromium only)
        run: npx playwright test --project=chromium --reporter=json --reporter=list
        id: e2e-run
        continue-on-error: true
      
      - name: Upload JSON test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-json
          path: report.json
          retention-days: 7
      
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-html
          path: playwright-report/
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
      
      - name: Analyze test results
        if: steps.e2e-run.outcome == 'failure'
        run: |
          echo "❌ E2E tests failed!"
          echo ""
          echo "=== Test Summary ==="
          if [ -f report.json ]; then
            python3 << 'EOF'
import json
with open('report.json') as f:
    data = json.load(f)
    stats = data.get('stats', {})
    print(f"Total tests: {stats.get('total', 'N/A')}")
    print(f"Passed: {stats.get('expected', 'N/A')}")
    print(f"Failed: {stats.get('unexpected', 'N/A')}")
    print("")
    print("=== Failed Tests ===")
    for test in data.get('tests', []):
        if test.get('outcome') == 'unexpected':
            print(f"❌ {test.get('title', 'Unknown')}")
            for result in test.get('results', []):
                if result.get('error'):
                    error = result['error']
                    print(f"   Error: {error.get('message', 'Unknown')[:200]}")
EOF
          fi
          echo ""
          echo "Check artifacts for detailed reports:"
          echo "  - playwright-report-json: JSON report"
          echo "  - playwright-report-html: HTML report with screenshots"
          echo "  - e2e-test-results: Test results and videos"
          exit 1

  # ==================== 构建测试 ====================
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run build test
        run: npm run test:build
      
      - name: Build frontend
        run: npm run build:frontend
        continue-on-error: true

  # ==================== 代码质量检查 ====================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run lint (if configured)
        run: npm run lint || echo "Lint not configured"

  # ==================== 测试覆盖率 ====================
  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install coverage dependencies
        run: npm install -D @vitest/coverage-v8
      
      - name: Generate coverage report
        run: npm run test:coverage || npm run test:unit -- --experimental-test-coverage
        continue-on-error: true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
          retention-days: 30

  # ==================== 汇总报告 ====================
  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, e2e-tests, build-test]
    if: always()
    
    steps:
      - name: Generate test summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component Tests | ${{ needs.component-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Total Test Files: 17" >> $GITHUB_STEP_SUMMARY
          echo "- Total Test Cases: 236+" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: 116 cases" >> $GITHUB_STEP_SUMMARY
          echo "- Component Tests: 80+ cases" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: 40+ cases" >> $GITHUB_STEP_SUMMARY
