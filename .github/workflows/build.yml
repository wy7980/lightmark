name: Build LightMark for Windows

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build frontend
        run: npm run build:frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseDraft: false
          args: --verbose

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: lightmark-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: lightmark-windows-portable
          path: src-tauri/target/release/LightMark.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: lightmark-windows-installer
          path: artifacts/installer
      
      - name: Download portable
        uses: actions/download-artifact@v4
        with:
          name: lightmark-windows-portable
          path: artifacts/portable

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/installer/*.exe
            artifacts/portable/*.exe
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
